name: 'Release'

# Triggered by a push of a vX.Y.Z tag (cut by prepare-release.yml).
# Builds and pushes the stable semver Docker tags and creates a GitHub
# release with filtered commit notes. Rolling `latest` is handled by
# docker-publish.yml on main pushes, not here.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.1)'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: protolabsai/protovoice

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.repository == 'protoLabsAI/protoVoice'
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      # Reclaim ~20GB from the GHA runner before the Docker build.
      # Without this, pip install of the full dep set overflows the ~14GB
      # default (the v0.12.5 release build failed at `ERROR: ... No space
      # left on device`). Kept in sync with docker-publish.yml.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      # ── Version ───────────────────────────────────────────────────────────────

      - name: Read version
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # ── Docker ────────────────────────────────────────────────────────────────

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `latest` is pushed on every main merge by docker-publish.yml;
          # this workflow only adds the stable semver pins.
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
          labels: |
            org.opencontainers.image.title=protovoice
            org.opencontainers.image.description=protoVoice — full-duplex voice agent on Pipecat
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Attest build provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # ── GitHub Release ────────────────────────────────────────────────────────

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" --jq '.body' 2>/dev/null || echo "")
          # Strip chore/docs noise lines from the auto-generated body
          FILTERED=$(echo "$NOTES" | grep -Eiv '^\* (chore|docs):' || echo "$NOTES")
          {
            echo "notes<<NOTES_EOF"
            echo "$FILTERED"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.notes.outputs.notes }}"

      # ── Claude-rewritten notes + Discord announcement ─────────────────────────

      - name: Polish release notes + post to Discord
        # Best-effort: if ANTHROPIC_API_KEY or a webhook isn't set, or the
        # Claude call fails, the release itself still shipped above — we
        # just skip the polished announcement.
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_RELEASE_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          DISCORD_DEV_WEBHOOK: ${{ secrets.DISCORD_DEV_WEBHOOK }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "ANTHROPIC_API_KEY not set — skipping Claude rewrite."
            exit 0
          fi
          VERSION="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)
          if [ -z "${PREV_TAG}" ]; then
            echo "No previous tag found — this is the first release; skipping polished notes."
            exit 0
          fi
          # Each webhook is checked independently inside the script.
          # Either can be unset — the script logs "webhook not set" and
          # moves on, so enabling one channel later requires no workflow
          # change.
          node scripts/rewrite-release-notes.mjs \
            "${VERSION}" "${PREV_TAG}" \
            --post-discord-release \
            --post-discord-dev

      # ── Failure alert ─────────────────────────────────────────────────────────

      - name: Alert on release failure
        if: failure()
        env:
          DISCORD_DEV_WEBHOOK: ${{ secrets.DISCORD_DEV_WEBHOOK }}
        run: |
          if [ -z "${DISCORD_DEV_WEBHOOK}" ]; then
            echo "DISCORD_DEV_WEBHOOK not set — can't alert."
            exit 0
          fi
          TAG="${{ steps.version.outputs.tag }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="protoVoice release FAILED for ${TAG}. Run: ${RUN_URL}"
          curl -sf -H 'Content-Type: application/json' \
            -d "{\"content\": \"${MSG}\"}" \
            "${DISCORD_DEV_WEBHOOK}" || true
