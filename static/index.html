<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>protoVoice</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; }
    body {
      margin: 0; min-height: 100vh; background: #000; color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    audio { display: none; }

    /* --- The viewport is the orb. ---------------------------------------- */
    #viz { position: fixed; inset: 0; z-index: 0; }
    #viz canvas {
      display: block; width: 100% !important; height: 100% !important;
      cursor: grab; touch-action: none;
    }
    #viz canvas:active { cursor: grabbing; }

    /* --- Hamburger toggle ------------------------------------------------- */
    #menu-toggle {
      position: fixed; top: 1rem; right: 1rem; z-index: 25;
      width: 2.75rem; height: 2.75rem;
      background: rgba(10, 15, 20, 0.55);
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 0.6rem;
      padding: 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      gap: 5px; cursor: pointer;
      transition: background 150ms;
    }
    #menu-toggle:hover { background: rgba(20, 184, 166, 0.20); }
    #menu-toggle span {
      display: block; width: 1.1rem; height: 2px; background: #e2e8f0;
      border-radius: 2px;
      transition: transform 220ms cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 180ms;
    }
    #menu-toggle[aria-expanded="true"] span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    #menu-toggle[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
    #menu-toggle[aria-expanded="true"] span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* --- Side drawer ------------------------------------------------------ */
    #drawer {
      position: fixed; top: 0; right: 0; z-index: 20;
      width: 22rem; max-width: 88vw; height: 100vh;
      background: rgba(10, 15, 20, 0.78);
      -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
      border-left: 1px solid rgba(148, 163, 184, 0.12);
      transform: translateX(100%);
      transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto; box-sizing: border-box;
    }
    #drawer[aria-hidden="false"] { transform: translateX(0); }
    .drawer-inner { padding: 5rem 1.5rem 1.5rem; display: grid; gap: 1rem; }
    .drawer-inner h1 {
      margin: 0; color: #5eead4; font-weight: 500; letter-spacing: -0.02em;
      font-size: 1.25rem;
    }
    .drawer-inner p { margin: 0; opacity: 0.65; font-size: 0.85rem; line-height: 1.5; }
    .drawer-inner button.primary {
      background: #14b8a6; color: #fff; border: 0; border-radius: 999px;
      padding: 0.75rem 1.5rem; font-size: 0.95rem; cursor: pointer;
      transition: background .15s;
      justify-self: start;
    }
    .drawer-inner button.primary:hover { background: #0d9488; }
    .drawer-inner button.primary:disabled { background: #475569; cursor: not-allowed; }

    .row { display: grid; grid-template-columns: auto 1fr; gap: 0.5rem 0.75rem;
           align-items: center; font-size: 0.85rem; }
    .row label { opacity: 0.7; }
    select, input[type=text], input[type=file], textarea {
      background: rgba(22, 32, 48, 0.6); color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 0.4rem;
      padding: 0.35rem 0.5rem; font-size: 0.85rem; width: 100%; box-sizing: border-box;
    }
    select:focus, input:focus, textarea:focus {
      outline: 0; border-color: #14b8a6;
    }

    details summary { cursor: pointer; opacity: 0.75; padding: 0.3rem 0; font-size: 0.85rem; }
    details summary:hover { opacity: 1; }
    .clone-form { display: grid; gap: 0.5rem; margin-top: 0.5rem; padding: 0.75rem;
      background: rgba(15, 22, 32, 0.55); border-radius: 0.5rem;
      border: 1px solid rgba(20, 184, 166, 0.12); }
    .clone-form label { font-size: 0.8rem; opacity: 0.75; }
    .clone-form textarea { resize: vertical; min-height: 3em; }
    .clone-form button {
      background: rgba(20, 184, 166, 0.85); color: #fff; border: 0;
      border-radius: 0.4rem; padding: 0.45rem 0.8rem;
      font-size: 0.85rem; cursor: pointer;
    }
    .clone-status { font-size: 0.75rem; opacity: 0.65; min-height: 1.2em; }

    /* --- Floating status pill --------------------------------------------- */
    #status-float {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      z-index: 15; font-size: 0.8rem; letter-spacing: 0.02em;
      background: rgba(10, 15, 20, 0.5);
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
      padding: 0.4rem 0.9rem; border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.12);
      pointer-events: none; transition: opacity 200ms;
      opacity: 1;
    }
    #status-float:empty { opacity: 0; }

    /* --- Tiny "dbl-click to start" hint at idle --------------------------- */
    #idle-hint {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, calc(-50% + 11rem));
      z-index: 12; font-size: 0.78rem; opacity: 0;
      color: rgba(226, 232, 240, 0.6);
      pointer-events: none; letter-spacing: 0.04em;
      transition: opacity 400ms;
    }
    #idle-hint.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="viz"></div>

  <button id="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

  <aside id="drawer" aria-hidden="true">
    <div class="drawer-inner">
      <h1>protoVoice</h1>
      <p>Double-click the orb to start or stop. Drag to spin. Click to pulse.</p>
      <button id="btn" class="primary">Start</button>

      <div class="row">
        <label for="skill" title="Applies on next Start">Skill</label>
        <select id="skill" title="Applies on next Start"></select>
        <label for="verbosity">Verbosity</label>
        <select id="verbosity">
          <option value="silent">silent</option>
          <option value="brief" selected>brief</option>
          <option value="narrated">narrated</option>
          <option value="chatty">chatty</option>
        </select>
        <label for="viz-preset">Visual</label>
        <select id="viz-preset">
          <option value="Default" selected>Default</option>
          <option value="Cyan">Cyan</option>
          <option value="Gray">Gray</option>
          <option value="Yellow">Yellow</option>
          <option value="Green">Green</option>
        </select>
      </div>

      <details>
        <summary>+ Clone a new voice</summary>
        <form class="clone-form" id="clone-form">
          <label>Audio sample (10-30s recommended)
            <input type="file" id="clone-audio" accept="audio/*" required>
          </label>
          <label>Slug (lowercase letters / digits / hyphens)
            <input type="text" id="clone-slug" placeholder="e.g. alex" required pattern="[a-z0-9][a-z0-9\-_]{1,63}">
          </label>
          <label>Display name (optional)
            <input type="text" id="clone-name" placeholder="e.g. Alex">
          </label>
          <label>Transcript (leave empty to auto-transcribe via Whisper)
            <textarea id="clone-transcript" placeholder="Exactly what the clip says. Accuracy matters for voice quality."></textarea>
          </label>
          <label>Description (optional)
            <input type="text" id="clone-description" placeholder="e.g. Voice-cloned Alex">
          </label>
          <button type="submit">Clone voice</button>
          <div class="clone-status" id="clone-status"></div>
        </form>
      </details>
    </div>
  </aside>

  <div id="status-float"></div>
  <div id="idle-hint" class="show">double-click the orb to start</div>
  <audio id="audio" autoplay></audio>

  <script type="module">
    import { VoiceOrb } from '/static/viz.js';

    const orb = new VoiceOrb(document.getElementById('viz'), { preset: 'Default' });
    window.__orb = orb;

    // --- Drawer toggle ----------------------------------------------------
    const drawer = document.getElementById('drawer');
    const toggle = document.getElementById('menu-toggle');
    const setDrawer = (open) => {
      drawer.setAttribute('aria-hidden', open ? 'false' : 'true');
      toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    };
    toggle.addEventListener('click', () => {
      const open = drawer.getAttribute('aria-hidden') === 'true';
      setDrawer(open);
    });

    // --- WebRTC ----------------------------------------------------------
    const btn = document.getElementById("btn");
    const audioEl = document.getElementById("audio");
    const statusEl = document.getElementById("status-float");
    const idleHint = document.getElementById("idle-hint");

    const setStatus = (t) => { statusEl.textContent = t; };
    let pc = null;
    let localStream = null;
    let session = 'idle';    // 'idle' | 'starting' | 'live'

    const sendIceCandidate = async (pc, candidate) => {
      await fetch("/api/offer", {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          pc_id: pc.pc_id,
          candidates: [{
            candidate: candidate.candidate,
            sdp_mid: candidate.sdpMid,
            sdp_mline_index: candidate.sdpMLineIndex,
          }],
        }),
      });
    };

    const start = async () => {
      if (session !== 'idle') return;
      session = 'starting';
      btn.disabled = true;
      idleHint.classList.remove('show');
      setStatus("requesting mic...");
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (_e) {
        setStatus("mic denied");
        btn.disabled = false;
        session = 'idle';
        idleHint.classList.add('show');
        return;
      }

      pc = new RTCPeerConnection({
        iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
      });
      pc.pendingIceCandidates = [];
      pc.canSendIceCandidates = false;

      pc.ontrack = (e) => {
        if (e.track.kind === "audio") {
          audioEl.srcObject = e.streams[0];
          orb.attachStream(e.streams[0], 'remote');
        }
      };
      pc.onconnectionstatechange = () => {
        setStatus(pc.connectionState);
        if (pc.connectionState === "disconnected" || pc.connectionState === "failed") {
          stop();
        }
      };
      pc.onicecandidate = async (e) => {
        if (!e.candidate) return;
        if (pc.canSendIceCandidates && pc.pc_id) {
          await sendIceCandidate(pc, e.candidate);
        } else {
          pc.pendingIceCandidates.push(e.candidate);
        }
      };

      pc.addTransceiver(localStream.getAudioTracks()[0], { direction: "sendrecv" });
      pc.addTransceiver("video", { direction: "sendrecv" });

      orb.attachStream(localStream, 'local');

      await pc.setLocalDescription(await pc.createOffer());
      setStatus("negotiating...");
      const res = await fetch("/api/offer", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          sdp: pc.localDescription.sdp,
          type: pc.localDescription.type,
        }),
      });
      const answer = await res.json();
      pc.pc_id = answer.pc_id;
      await pc.setRemoteDescription(answer);

      pc.canSendIceCandidates = true;
      for (const c of pc.pendingIceCandidates) await sendIceCandidate(pc, c);
      pc.pendingIceCandidates = [];

      setStatus("connected — speak");
      session = 'live';
      btn.textContent = "Stop";
      btn.disabled = false;
    };

    const stop = () => {
      if (session === 'idle') return;
      if (pc) { pc.close(); pc = null; }
      if (localStream) { for (const t of localStream.getTracks()) t.stop(); localStream = null; }
      audioEl.srcObject = null;
      orb.detachStream('local');
      orb.detachStream('remote');
      btn.textContent = "Start";
      btn.disabled = false;
      session = 'idle';
      setStatus("");
      idleHint.classList.add('show');
    };

    const toggleSession = () => {
      if (session === 'idle') start();
      else if (session === 'live') stop();
    };

    btn.onclick = toggleSession;

    // Double-click the orb to start/stop. The orb canvas lives in #viz.
    document.getElementById('viz').addEventListener('dblclick', (e) => {
      e.preventDefault();
      toggleSession();
    });

    // --- Verbosity -------------------------------------------------------
    const verbEl = document.getElementById("verbosity");
    fetch("/api/verbosity")
      .then(r => r.json())
      .then(j => { if (j.verbosity) verbEl.value = j.verbosity; })
      .catch(() => {});
    verbEl.addEventListener("change", async () => {
      await fetch("/api/verbosity", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ level: verbEl.value }),
      });
    });

    // --- Visual preset ---------------------------------------------------
    const vizEl = document.getElementById("viz-preset");
    vizEl.addEventListener("change", () => orb.setPreset(vizEl.value));

    // --- Skill dropdown --------------------------------------------------
    const skillEl = document.getElementById("skill");
    async function refreshSkills(selectSlug) {
      const j = await fetch("/api/skills").then(r => r.json()).catch(() => ({skills: []}));
      skillEl.innerHTML = "";
      (j.skills || []).forEach(s => {
        const opt = document.createElement("option");
        opt.value = s.slug;
        opt.textContent = s.name;
        if (s.description) opt.title = s.description;
        if (s.slug === (selectSlug || j.active)) opt.selected = true;
        skillEl.appendChild(opt);
      });
    }
    refreshSkills();
    skillEl.addEventListener("change", async () => {
      await fetch("/api/skills", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ slug: skillEl.value }),
      });
    });

    // --- Voice clone -----------------------------------------------------
    const cloneForm = document.getElementById("clone-form");
    const cloneStatus = document.getElementById("clone-status");
    cloneForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const audio = document.getElementById("clone-audio").files[0];
      const slug = document.getElementById("clone-slug").value.trim();
      const name = document.getElementById("clone-name").value.trim();
      const transcript = document.getElementById("clone-transcript").value.trim();
      const description = document.getElementById("clone-description").value.trim();
      if (!audio || !slug) { cloneStatus.textContent = "audio + slug required"; return; }
      cloneStatus.textContent = transcript ? "uploading..." : "uploading + auto-transcribing...";
      const fd = new FormData();
      fd.append("audio", audio);
      fd.append("slug", slug);
      if (name) fd.append("name", name);
      if (transcript) fd.append("transcript", transcript);
      if (description) fd.append("description", description);
      try {
        const resp = await fetch("/api/voice/clone", { method: "POST", body: fd });
        const j = await resp.json();
        if (j.error) {
          cloneStatus.textContent = "error: " + j.error;
          return;
        }
        const hint = j.auto_transcribed ? ` (transcribed: "${j.transcript.slice(0,60)}${j.transcript.length>60?'…':''}")` : "";
        cloneStatus.textContent = `✓ cloned as ${j.name}${hint}`;
        await refreshSkills(j.slug);
        cloneForm.reset();
      } catch (err) {
        cloneStatus.textContent = "error: " + err;
      }
    });
  </script>
</body>
</html>
